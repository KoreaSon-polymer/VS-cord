name: Korean research funding monitor

on:
  schedule:
    # 00:30 UTC is 09:30 Korea Standard Time.
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r tools/funding_monitor/requirements.txt

      - name: Run Korean research funding monitor
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          MONITOR_EMAIL_TO: ${{ secrets.MONITOR_EMAIL_TO }}
          RECENT_DAYS: "14"
          DEADLINE_DAYS: "60"
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: python tools/funding_monitor/monitor.py
